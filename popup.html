<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 400px;
      background: #0f0f0f;
      color: #e0e0e0;
    }

    .header {
      padding: 14px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .header p { font-size: 11px; color: #666; margin-top: 2px; }

    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
    }

    button {
      padding: 9px 16px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #startBtn { background: #22c55e; color: #fff; flex: 1; }
    #stopBtn  { background: #ef4444; color: #fff; flex: 1; }
    #enhanceBtn { background: #6366f1; color: #fff; width: 100%; }
    #copyBtn    { background: #262626; color: #ccc; width: 100%; margin-top: 8px; border: 1px solid #333; }
    #resetBtn   { background: #3a1a1a; color: #f87171; width: 100%; margin-top: 8px; border: 1px solid #5a2a2a; }

    .status {
      padding: 4px 16px 10px;
      font-size: 12px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status.recording { color: #22c55e; }
    .status.done      { color: #6366f1; }

    .dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    .event-count {
      font-size: 11px;
      color: #555;
      padding: 0 16px 8px;
    }

    .code-wrap { padding: 0 16px 10px; }
    textarea {
      width: 100%;
      height: 190px;
      background: #141414;
      color: #7dd3a8;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      resize: vertical;
      outline: none;
    }

    .actions { padding: 0 16px 10px; }

    .loader {
      display: none;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: #6366f1;
    }

    .api-wrap {
      padding: 10px 16px 14px;
      border-top: 1px solid #1f1f1f;
    }
    .api-wrap label { font-size: 11px; color: #555; display: block; margin-bottom: 4px; }
    .api-wrap input {
      width: 100%;
      padding: 7px 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #ccc;
      font-size: 12px;
      outline: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>🎬 Playwright Recorder</h1>
      <p>Record interactions → Generate Playwright JS</p>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn">▶ Start Recording</button>
    <button id="stopBtn" disabled>■ Stop</button>
  </div>

  <div class="status" id="status">Ready to record</div>
  <div class="event-count" id="eventCount"></div>

  <div class="code-wrap">
    <textarea id="codeOutput" placeholder="// Playwright code will appear here after recording..." readonly></textarea>
  </div>

  <div class="actions">
    <button id="enhanceBtn" disabled>✨ Enhance with AI</button>
    <button id="copyBtn" disabled>📋 Copy Code</button>
    <button id="resetBtn">🗑 Reset</button>
    <div class="loader" id="loader">⏳ AI is enhancing your test...</div>
  </div>

  <div class="api-wrap">
    <label for="apiKeyInput">Gemini API Key</label>
    <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key…" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
